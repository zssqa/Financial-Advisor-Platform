server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus,metrics,info
  metrics:
    tags:
      application: ${spring.application.name}
  endpoint:
    prometheus:
      enabled: true

spring:
  application:
    name: financial-advisor
  main:
    allow-bean-definition-overriding: true
  jackson:
    serialization:
      write-dates-as-timestamps: false
  autoconfigure:
    exclude:
      - com.alibaba.cloud.ai.a2a.autoconfigure.server.A2aServerAutoConfiguration
      - com.alibaba.cloud.ai.a2a.autoconfigure.server.A2aServerHandlerAutoConfiguration
      - com.alibaba.cloud.ai.a2a.autoconfigure.server.A2aServerAgentCardAutoConfiguration
      - com.alibaba.cloud.ai.a2a.autoconfigure.nacos.NacosA2aRegistryAutoConfiguration
      - com.alibaba.cloud.ai.agent.nacos.config.NacosAgentConfig
      - org.springframework.ai.mcp.server.common.autoconfigure.McpServerAutoConfiguration
      - org.springframework.ai.mcp.server.common.autoconfigure.annotations.McpServerAnnotationScannerAutoConfiguration
      - org.springframework.ai.mcp.server.common.autoconfigure.annotations.McpServerSpecificationFactoryAutoConfiguration

  ai:
    dashscope:
      api-key: ${AI_DASHSCOPE_API_KEY}
      chat:
        model: qwen3.6-plus
        options:
          temperature: 0.7

    vectorstore:
      pgvector:
        host: ${PGVECTOR_HOST:localhost}
        port: 5432
        database: financial_rag
        username: postgres
        password: ${DB_PASSWORD:root}
        initialize-schema: false

    # 对话记忆 JDBC 持久化配置（PostgreSQL）
    # 始终初始化 schema（CREATE TABLE IF NOT EXISTS，幂等），确保 SPRING_AI_CHAT_MEMORY 表存在
    chat:
      memory:
        repository:
          jdbc:
            initialize-schema: always

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/financial_rag
    username: postgres
    password: ${DB_PASSWORD:root}
    driver-class-name: org.postgresql.Driver

tavily:
  api-key: ${TAVILY_API_KEY:}

# 禁用 Nacos 客户端日志（避免权限问题拖慢启动）
nacos:
  logging:
    default:
      config:
        enabled: false

# 框架配置
advisor:
  context-compression:
    max-messages: 20
    keep-after-trim: 6
  confirmation:
    required-amount: 100000
  checkpoint:
    saver: postgres    # memory | postgres | redis (生产使用 postgres 持久化对话状态)
  jwt:
    secret: ${JWT_SECRET:financial-advisor-super-secret-key-2026-please-change-in-production}
    expiration: 86400000
