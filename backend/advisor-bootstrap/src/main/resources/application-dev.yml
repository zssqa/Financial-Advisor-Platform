spring:
  main:
    allow-bean-definition-overriding: true
  ai:
    dashscope:
      api-key: ${AI_DASHSCOPE_API_KEY:}
      chat:
        model: qwen3.6-plus
        options:
          temperature: 0.7
      embedding:
        options:
          model: text-embedding-v3

    vectorstore:
      pgvector:
        host: localhost
        port: 5432
        database: financial_rag
        username: postgres
        password: root
        initialize-schema: true

  datasource:
    url: jdbc:postgresql://localhost:5432/financial_rag
    username: postgres
    password: root
    driver-class-name: org.postgresql.Driver

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

logging:
  level:
    com.finance.advisor: DEBUG
    com.alibaba.cloud.ai.graph: DEBUG

tavily:
  api-key: ${TAVILY_API_KEY:}

advisor:
  context-compression:
    max-messages: 20
    keep-after-trim: 6
  confirmation:
    required-amount: 100000
  checkpoint:
    saver: postgres
